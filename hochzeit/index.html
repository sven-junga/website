<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex, nofollow">
  <meta name="googlebot" content="noindex, nofollow">
  <title>Hochzeits-Sause Antonia & Sven</title>
</head>
<body>
  <p>🥂</p>

  <script>
    const ua = navigator.userAgent.toLowerCase();

    const isIOS =
      ua.includes("iphone") ||
      ua.includes("ipad") ||
      ua.includes("ipod");

    const isSafariMac =
      ua.includes("macintosh") &&
      ua.includes("safari") &&
      !ua.includes("chrome");

    if (isIOS || isSafariMac) {
      window.location.replace("/hochzeit/apple-music");
    } else {
      window.location.replace("/hochzeit/spotify");
    }
  </script>

  <noscript>
    <p>
      Kein JS? Hacky! Klick selbst: 
      <a href="/hochzeit/apple-music">Apple Music</a> |
      <a href="/hochzeit/spotify">Spotify</a>
    </p>
  </noscript>
</body>
</html>
