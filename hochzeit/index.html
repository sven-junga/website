n<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex, nofollow">
  <meta name="googlebot" content="noindex, nofollow">
  <title>Hochzeits-Sause Antonia & Sven</title>

  <link rel="stylesheet" href="style.css">
  
  <script>
    const ua = navigator.userAgent.toLowerCase();

    const isIOS =
      ua.includes("iphone") ||
      ua.includes("ipad") ||
      ua.includes("ipod");

    const isSafariMac =
      ua.includes("macintosh") &&
      ua.includes("safari") &&
      !ua.includes("chrome");

    const isAppleInvitesAHotPileOfGarbage = true;

    if ((isIOS || isSafariMac) && !isAppleInvitesAHotPileOfGarbage) {
      window.location.replace("apple-music/");
    } else {
      window.location.replace("spotify/");
    }
  </script>
</head>
<body>
  <div class="rotierende-sektfloeten fade-in">🥂</div>
  <noscript>
    <p>
      Kein JS? Hacky! Klick selbst: 
      <a href="apple-music/">Apple Music</a> |
      <a href="spotify/">Spotify</a>
    </p>
  </noscript>
</body>
</html>
