<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex, nofollow">
  <meta name="googlebot" content="noindex, nofollow">
  <title>Hochzeits-Sause Antonia & Sven</title>

  <script>
    const ua = navigator.userAgent.toLowerCase();

    const isIOS =
      ua.includes("iphone") ||
      ua.includes("ipad") ||
      ua.includes("ipod");

    const isSafariMac =
      ua.includes("macintosh") &&
      ua.includes("safari") &&
      !ua.includes("chrome");

    if (isIOS || isSafariMac) {
      window.location.replace("apple-music/");
    } else {
      window.location.replace("spotify/");
    }
  </script>

  <style>
    html, body {
      height: 100%;
      margin: 0;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #fff;
      font-family: system-ui, sans-serif;
    }

    .rotierende-sektfloeten {
      font-size: 4rem;
      animation: spin 1.2s linear infinite;
    }

    @keyframes spin {
      from {
        transform: rotate(0deg);
      }
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>
<body>
  <div class="rotierende-sektfloeten">🥂</div>
  <noscript>
    <p>
      Kein JS? Hacky! Klick selbst: 
      <a href="apple-music/">Apple Music</a> |
      <a href="spotify/">Spotify</a>
    </p>
  </noscript>
</body>
</html>
